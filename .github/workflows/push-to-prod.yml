name: Push to Production

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Commit Hash to checkout'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.commit_hash }}
    - name: Setup
      run: npm install -g handlebars typescript webpack webpack-cli && cd typescript && npm install
    - name: Create version.txt
      run: |
        git_hash=$(git rev-parse --short "$GITHUB_SHA")
        git_branch=${GITHUB_REF#refs/heads/}
        echo "$git_branch-$git_hash" > version.txt
        echo "GIT_BRANCH=$git_branch" >> $GITHUB_ENV
        echo "GIT_HASH=$git_hash" >> $GITHUB_ENV
    - name: Build
      run: cargo build --release --verbose
    - name: Run tests
      run: cargo test --release --verbose
    - name: Package artifact
      run: |
        mkdir packaged
        cp target/release/Verfassungsbooks packaged/ 
        mkdir packaged/config && mkdir packaged/data 
        cp -R data/csl_locales packaged/data/ 
        cp -R data/csl_styles packaged/data/ 
        cp -R templates packaged/templates 
        cp config/default.toml packaged/config/ 
        cp Rocket.toml packaged/ 
        cp version.txt packaged/ 
        cp -R static packaged/static 
        cd packaged
        tar -vczf ../verfassungsbooks-bundled.tar.gz *
    - uses: actions/upload-artifact@v4
      with:
        name: verfassungsbooks-server
        path: verfassungsbooks-bundled.tar.gz
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: verfassungsbooks-server
          path: dest
      - name: List dest
        run: ls -R dest
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod_ssh_key
          chmod 600 ~/.ssh/*
          ssh-keyscan -t ed25519 editor.verfassungsblog.de >> ~/.ssh/known_hosts
      - name: Stop verfassungsbooks server and backup old directory
        run: | 
          ssh -i ~/.ssh/prod_ssh_key -t verfassungsbooks@editor.verfassungsblog.de "sudo systemctl stop verfassungsbooks-server.service"
          ssh -i ~/.ssh/prod_ssh_key -t verfassungsbooks@editor.verfassungsblog.de "rm -R /home/verfassungsbooks/verfassungsbooks-server-old && cp -R /home/verfassungsbooks/verfassungsbooks-server /home/verfassungsbooks/verfassungsbooks-server-old"
      - name: Upload artifact to staging server
        run: scp -i ~/.ssh/prod_ssh_key dest/verfassungsbooks-bundled.tar.gz verfassungsbooks@editor.verfassungsblog.de:/home/verfassungsbooks/verfassungsbooks-bundled.tar.gz
      - name: Start update and start staging server
        run: |
          ssh -i ~/.ssh/prod_ssh_key -t verfassungsbooks@editor.verfassungsblog.de "cd /home/verfassungsbooks && ./update.sh verfassungsbooks-bundled.tar.gz verfassungsbooks-server"
          ssh -i ~/.ssh/prod_ssh_key -t verfassungsbooks@editor.verfassungsblog.de "sudo systemctl start verfassungsbooks-server.service"
