name: Build Master & Deploy to staging

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup
      run: npm install -g handlebars typescript webpack webpack-cli && cd typescript && npm install
    - name: Create version.txt
      run: |
        git_hash=$(git rev-parse --short "$GITHUB_SHA")
        git_branch=${GITHUB_REF#refs/heads/}
        echo "$git_branch-$git_hash" > version.txt
    - name: Build
      run: cargo build --release --verbose
    - name: Run tests
      run: cargo test --release --verbose
    - name: Package artifact
      run: |
        mkdir packaged
        cp target/release/Verfassungsbooks packaged/ 
        mkdir packaged/config && mkdir packaged/data 
        cp -R data/csl_locales packaged/data/ 
        cp -R data/csl_styles packaged/data/ 
        cp -R templates packaged/templates 
        cp config/default.toml packaged/config/ 
        cp Rocket.toml packaged/ 
        cp version.txt packaged/ 
        cp -R static packaged/static 
        cd packaged
        tar -vczf ../verfassungsbooks-bundled.tar.gz *
    - uses: actions/upload-artifact@v4
      with:
        name: verfassungsbooks-server
        path: verfassungsbooks-bundled.tar.gz
    - uses: softprops/action-gh-release@v2
      with:
        files: verfassungsbooks-bundled.tar.gz
        name: "${{git_branch}}-${{git_hash}}"
        tag_name: "${{git_branch}}-${{git_hash}}"
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: verfassungsbooks-server
          path: dest
      - name: List dest
        run: ls -R dest
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/staging_ssh_key
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod_ssh_key
          chmod 600 ~/.ssh/*
          ssh-keyscan -t ed25519 editor-staging.verfassungsblog.de >> ~/.ssh/known_hosts
          ssh-keyscan -t ed25519 editor.verfassungsblog.de >> ~/.ssh/known_hosts
      - name: Cleanup staging server files, Copy data directory from production server
        run: | 
          ssh -i ~/.ssh/staging_ssh_key -t verfassungsbooks@editor-staging.verfassungsblog.de "sudo systemctl stop verfassungsbooks-server.service"
          ssh -i ~/.ssh/staging_ssh_key -t verfassungsbooks@editor-staging.verfassungsblog.de "rm -Rf /home/verfassungsbooks/verfassungsbooks-server/data"
          scp -i ~/.ssh/prod_ssh_key -r verfassungsbooks@editor.verfassungsblog.de:/home/verfassungsbooks/verfassungsbooks-server/data data
          scp -i ~/.ssh/staging_ssh_key -r data verfassungsbooks@editor-staging.verfassungsblog.de:/home/verfassungsbooks/verfassungsbooks-server/data
      - name: Upload artifact to staging server
        run: scp -i ~/.ssh/staging_ssh_key dest/verfassungsbooks-bundled.tar.gz verfassungsbooks@editor-staging.verfassungsblog.de:/home/verfassungsbooks/verfassungsbooks-bundled.tar.gz
      - name: Start update and start staging server
        run: |
          ssh -i ~/.ssh/staging_ssh_key -t verfassungsbooks@editor-staging.verfassungsblog.de "cd /home/verfassungsbooks && ./update.sh verfassungsbooks-bundled.tar.gz verfassungsbooks-server"
          ssh -i ~/.ssh/staging_ssh_key -t verfassungsbooks@editor-staging.verfassungsblog.de "sudo systemctl start verfassungsbooks-server.service"
