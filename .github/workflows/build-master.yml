name: Build Master & Deploy to staging

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup
      run: | 
        sudo apt-get update
        sudo apt-get install musl-tools
        rustup target add x86_64-unknown-linux-musl
        npm install -g handlebars typescript@5.9.3 webpack webpack-cli
        cd typescript && npm install
    - name: Create version.txt
      run: |
        git_hash=$(git rev-parse --short "$GITHUB_SHA")
        git_branch=${GITHUB_REF#refs/heads/}
        echo "$git_branch-$git_hash" > version.txt
        echo "GIT_BRANCH=$git_branch" >> $GITHUB_ENV
        echo "GIT_HASH=$git_hash" >> $GITHUB_ENV
    - name: Build x86_64-unknown-linux-gnu
      run: cargo build --release --verbose --target x86_64-unknown-linux-gnu
    - name: Build x86_64-unknown-linux-musl
      run: cargo build --release --verbose --target x86_64-unknown-linux-musl
    - name: Run tests
      run: cargo test --release --verbose
    - name: Package artifact x86_64-unknown-linux-gnu
      run: |
        mkdir packaged
        cp target/release/PublishGoods packaged/ 
        mkdir packaged/config && mkdir packaged/data 
        cp -R data/csl_locales packaged/data/ 
        cp -R data/csl_styles packaged/data/ 
        cp -R templates packaged/templates 
        cp config/default.toml packaged/config/ 
        cp Rocket.toml packaged/ 
        cp version.txt packaged/ 
        cp -R static packaged/static 
        cd packaged
        tar -vczf ../publishgoods-bundled-x86_64-unknown-linux-gnu.tar.gz *+
    - name: Package artifact x86_64-unknown-linux-musl
      run: |
        mkdir packaged-musl
        cp target/x86_64-unknown-linux-musl/release/PublishGoods packaged-musl/
        mkdir packaged-musl/config && mkdir packaged-musl/data 
        cp -R data/csl_locales packaged-musl/data/ 
        cp -R data/csl_styles packaged-musl/data/ 
        cp -R templates packaged-musl/templates 
        cp config/default.toml packaged-musl/config/ 
        cp Rocket.toml packaged-musl/ 
        cp version.txt packaged-musl/ 
        cp -R static packaged-musl/static 
        cd packaged-musl
        tar -vczf ../publishgoods-bundled-x86_64-unknown-linux-musl.tar.gz *
    - uses: actions/upload-artifact@v4
      with:
        name: publishgoods-server-x86_64-unknown-linux-gnu
        path: publishgoods-bundled-x86_64-unknown-linux-gnu.tar.gz
    - uses: actions/upload-artifact@v4
      with:
        name: publishgoods-server-x86_64-unknown-linux-musl
        path: publishgoods-bundled-x86_64-unknown-linux-musl.tar.gz
    - uses: softprops/action-gh-release@v2
      with:
        files: publishgoods-bundled.tar.gz
        name: "${{ env.GIT_BRANCH }}-${{ env.GIT_HASH }}"
        draft: true
        tag_name: "${{ env.GIT_BRANCH }}-${{ env.GIT_HASH }}"
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: publishgoods-server-x86_64-unknown-linux-gnu
          path: dest
      - name: List dest
        run: ls -R dest
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/staging_ssh_key
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod_ssh_key
          chmod 600 ~/.ssh/*
          ssh-keyscan -t ed25519 editor-staging.verfassungsblog.de >> ~/.ssh/known_hosts
          ssh-keyscan -t ed25519 editor.verfassungsblog.de >> ~/.ssh/known_hosts
      - name: Cleanup staging server files, Copy data directory from production server
        run: | 
          ssh -i ~/.ssh/staging_ssh_key -T verfassungsbooks@editor-staging.verfassungsblog.de "sudo systemctl stop verfassungsbooks-server.service"
          ssh -i ~/.ssh/staging_ssh_key -T verfassungsbooks@editor-staging.verfassungsblog.de "rm -Rf /home/verfassungsbooks/verfassungsbooks-server/data"
          rsync -avz --timeout=60 --progress -e "ssh -i ~/.ssh/prod_ssh_key -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=accept-new" verfassungsbooks@editor.verfassungsblog.de:/home/verfassungsbooks/verfassungsbooks-server/data/ data/
          rsync -avz --timeout=60 --progress -e "ssh -i ~/.ssh/staging_ssh_key -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=accept-new" data/ verfassungsbooks@editor-staging.verfassungsblog.de:/home/verfassungsbooks/verfassungsbooks-server/data/
      - name: Upload artifact to staging server
        run: scp -i ~/.ssh/staging_ssh_key dest/publishgoods-bundled-x86_64-unknown-linux-gnu.tar.gz verfassungsbooks@editor-staging.verfassungsblog.de:/home/verfassungsbooks/publishgoods-bundled.tar.gz
      - name: Start update and start staging server
        run: |
          ssh -i ~/.ssh/staging_ssh_key -T verfassungsbooks@editor-staging.verfassungsblog.de "cd /home/verfassungsbooks && ./update.sh publishgoods-bundled.tar.gz verfassungsbooks-server"
          ssh -i ~/.ssh/staging_ssh_key -T verfassungsbooks@editor-staging.verfassungsblog.de "sudo systemctl start verfassungsbooks-server.service"
